<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#fff0f5);
  color: #4b3b3b;
  overflow-x: hidden;
}

/* ================= HERO ================= */
.hero {
  height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-card {
  width: 70%;
  padding: 50px;
  border-radius: 20px;
  background: #fff6ef;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 52px;
}

/* ================= SECTION ================= */
.section {
  padding: 80px 0;
  display: flex;
  justify-content: center;
}

.card {
  width: 60%;
  padding: 40px;
  border-radius: 20px;
  background: #fff6ef;
  text-align: center;
}

/* ================= CAKE ================= */
#cakeBox {
  position: relative;
  width: 150px;
  height: 150px;
  margin: auto;
}

#drawCanvas {
  position: absolute;
  top: 15px;
  left: 15px;
  width: 120px;
  height: 120px;
}

#knife {
  position: absolute;
  top: 40px;
  left: 0;
  font-size: 30px;
  cursor: grab;
}

#cutLine {
  position: absolute;
  top: 70px;
  left: 20px;
  height: 3px;
  width: 0;
  background: #8b0000;
}

/* ================= GALLERY ================= */
.gallery {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.gallery img {
  width: 150px;
  height: 150px;
  border-radius: 12px;
  object-fit: cover;
}

/* ================= ANIMATIONS ================= */
.balloon {
  position: absolute;
  bottom: -50px;
  width: 30px;
  height: 40px;
  background: #ff9aa2;
  border-radius: 50%;
  animation: rise 6s infinite;
}

@keyframes rise {
  to { transform: translateY(-100vh); }
}

.flower {
  position: fixed;
  top: -20px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-card">
    <h1>Happy Birthday 💖</h1>
    <button onclick="startExperience()">Start</button>
  </div>
</div>

<!-- CAKE -->
<div class="section">
  <div class="card">
    <h2>Decorate your cake 🎂</h2>

    <div id="cakeBox">
      <div id="cakeBase" style="font-size:120px;">🎂</div>
      <canvas id="drawCanvas"></canvas>
      <div id="cutLine"></div>
      <div id="knife">🔪</div>
    </div>

    <div>
      <button onclick="setTool('red')">❤️</button>
      <button onclick="setTool('white')">🤍</button>
      <button onclick="setTool('chocolate')">🍫</button>
      <button onclick="setTool('strawberry')">🍓</button>
      <button onclick="setTool('sparkle')">✨</button>
    </div>
  </div>
</div>

<!-- MEMORIES -->
<div class="section">
  <div class="card">
    <h2>Memories 💖</h2>
    <div class="gallery">
      <img src="image01.jpeg">
      <img src="image02.jpeg">
      <img src="image03.jpeg">
      <img src="image04.jpeg">
      <img src="image05.jpeg">
    </div>
  </div>
</div>

<!-- LETTER -->
<div class="section">
  <div class="card">
    <p id="message"></p>
    <button onclick="playVoice()">Play Voice 💌</button>
  </div>
</div>

<audio id="hb" src="birthday.mp3"></audio>
<audio id="kesariya" src="kesariya.mp3"></audio>
<audio id="voice" src="voice.mpeg"></audio>

<script>

/* ================= STATE ================= */
let tool = "red";
let drawing = false;

/* ================= START ================= */
function startExperience(){
  document.getElementById("hb").play();
}

/* ================= DRAW ================= */
const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 120;
canvas.height = 120;

function setTool(t){ tool = t; }

canvas.onmousedown = () => { drawing = true; ctx.beginPath(); }
canvas.onmouseup = () => drawing = false;

canvas.onmousemove = e => {
  if(!drawing) return;

  let x = e.offsetX;
  let y = e.offsetY;

  if(tool==="red"){
    ctx.fillStyle="#ff4d6d";
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
  }

  if(tool==="white"){
    ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
  }

  if(tool==="chocolate"){
    ctx.strokeStyle="#5a2d0c";
    ctx.lineWidth=2;
    ctx.lineTo(x,y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x,y);
  }

  if(tool==="sparkle"){
    ctx.fillStyle="#ffd700";
    ctx.fillRect(x,y,2,2);
  }
};

canvas.onclick = e => {
  if(tool==="strawberry"){
    ctx.fillText("🍓", e.offsetX, e.offsetY);
  }
};

/* ================= KNIFE ================= */
let knife = document.getElementById("knife");
let cutting = false;

knife.onmousedown = () => cutting = true;
document.onmouseup = () => cutting = false;

document.onmousemove = e => {
  if(!cutting) return;

  let box = document.getElementById("cakeBox").getBoundingClientRect();
  let x = e.clientX - box.left;

  knife.style.left = x + "px";
  document.getElementById("cutLine").style.width = x + "px";

  if(x > 100) performCut();
};

/* ================= CUT ================= */
function performCut(){
  document.getElementById("cakeBase").innerHTML = "🍰";
  document.getElementById("hb").pause();
  createBalloons();
  createFlowers();
  document.getElementById("kesariya").play();
}

/* ================= EFFECTS ================= */
function createBalloons(){
  for(let i=0;i<10;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    document.body.appendChild(b);
  }
}

function createFlowers(){
  for(let i=0;i<20;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="🌸";
    f.style.left=Math.random()*100+"vw";
    document.body.appendChild(f);
  }
}

/* ================= LETTER ================= */
const text = "happy birthday my love ❤️";
let i = 0;

function typeLetter(){
  let el = document.getElementById("message");
  function type(){
    if(i<text.length){
      el.innerHTML+=text[i];
      i++;
      setTimeout(type,30);
    }
  }
  type();
}

window.onload = typeLetter;

/* ================= VOICE ================= */
function playVoice(){
  document.getElementById("kesariya").pause();
  document.getElementById("voice").play();
}

</script>

</body>
</html>
