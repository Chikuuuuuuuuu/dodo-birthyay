<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ffd6e0,#ffeef2);
  color:#3b2f2f;
  overflow:hidden;
}

/* NAV */
.navbar{
  position:fixed; top:0; width:100%;
  display:flex; justify-content:center; gap:40px;
  padding:15px; background:rgba(255,255,255,0.5);
  backdrop-filter:blur(10px); z-index:1000;
}

/* SCREEN */
.screen{
  position:absolute; width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
}
.hidden{display:none;}

/* CARD */
.card{
  background:rgba(255,255,255,0.7);
  padding:40px; border-radius:20px;
  text-align:center;
}

/* CURSIVE */
h1{
  font-family:'Great Vibes',cursive;
  font-size:3rem;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none; border-radius:20px;
  background:#ff9aa2; color:white;
  cursor:pointer;
}

/* CANVAS DRAW */
#drawCanvas{
  position:absolute;
  width:150px; height:150px;
  cursor:crosshair;
}

/* COLOR PALETTE */
.palette span{
  display:inline-block;
  width:20px;height:20px;
  border-radius:50%;margin:5px;
  cursor:pointer;
}

/* GALLERY FLIP */
.flip{
  width:150px;height:150px;
  perspective:1000px;
}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}
.flip.clicked .flip-inner{
  transform:rotateY(180deg);
}
.flip-front, .flip-back{
  position:absolute;width:100%;height:100%;
  backface-visibility:hidden;
  border-radius:10px;
}
.flip-front img{
  width:100%;height:100%;object-fit:cover;
}
.flip-back{
  background:white;display:flex;
  justify-content:center;align-items:center;
  transform:rotateY(180deg);
  padding:10px;font-size:12px;
}

/* BALLOONS */
.balloon{
  position:absolute;
  bottom:-50px;
  width:30px;height:40px;
  background:#ff9aa2;
  border-radius:50%;
  animation:float 6s infinite;
}
@keyframes float{
  to{transform:translateY(-110vh);}
}

/* CONFETTI */
canvas{position:absolute;top:0;}
</style>
</head>

<body>

<div class="navbar">
  <span onclick="goTo('home')">Home</span>
  <span onclick="goTo('cake')">Cake</span>
  <span onclick="goTo('memories')">Memories</span>
  <span onclick="goTo('letter')">Letter</span>
</div>

<canvas id="confetti"></canvas>

<!-- HOME -->
<div class="screen" id="home">
<div class="card">
<h1>Happy Birthday ❤️</h1>
<button onclick="goTo('cake')">click this only if you love me</button>
</div>
</div>

<!-- CAKE -->
<div class="screen hidden" id="cake">
<div class="card">
<h2>decorate your cake 🎂</h2>

<div style="position:relative;">
<div style="font-size:120px;">🎂</div>
<canvas id="drawCanvas"></canvas>
</div>

<div class="palette">
<span style="background:red" onclick="setColor('red')"></span>
<span style="background:blue" onclick="setColor('blue')"></span>
<span style="background:green" onclick="setColor('green')"></span>
<span style="background:purple" onclick="setColor('purple')"></span>
<span style="background:black" onclick="setColor('black')"></span>
</div>

<button onclick="cutCake()">cut the cake 🎂</button>
</div>
</div>

<!-- CELEBRATION -->
<div class="screen hidden" id="celebrate">
<div class="card">
<h1>Happy Birthday Dodo 🎉</h1>
<div id="balloons"></div>
<button onclick="startLetter()">one more thing 💌</button>
</div>
</div>

<!-- LETTER -->
<div class="screen hidden" id="letter">
<div class="card">
<div id="message"></div>
<button onclick="playVoice()">only click this when you miss me 💖</button>
</div>
</div>

<!-- MEMORIES -->
<div class="screen hidden" id="memories">
<div class="card" style="display:flex;gap:15px;flex-wrap:wrap;">

<div class="flip" onclick="flip(this)">
<div class="flip-inner">
<div class="flip-front"><img src="photo1.jpg"></div>
<div class="flip-back">baby millennium winner 🥺</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="flip-inner">
<div class="flip-front"><img src="photo2.jpg"></div>
<div class="flip-back">the way you love your maa ❤️</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="flip-inner">
<div class="flip-front"><img src="photo3.jpg"></div>
<div class="flip-back">your football world ⚽</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="flip-inner">
<div class="flip-front"><img src="photo4.jpg"></div>
<div class="flip-back">okay but wow 😭</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="flip-inner">
<div class="flip-front"><img src="photo5.jpg"></div>
<div class="flip-back">this is us ❤️</div>
</div>
</div>

</div>
</div>

<audio id="hb" src="birthday.mp3"></audio>
<audio id="kesariya" src="kesariya.mp3"></audio>
<audio id="voice" src="voice.mp3"></audio>
<audio id="type" src="type.mp3"></audio>

<script>
// NAV
function goTo(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

// DRAW
let color="red";
function setColor(c){color=c;}

const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
canvas.width=150;canvas.height=150;

let draw=false;
canvas.onmousedown=()=>draw=true;
canvas.onmouseup=()=>draw=false;
canvas.onmousemove=e=>{
if(!draw)return;
ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(e.offsetX,e.offsetY,3,0,Math.PI*2);
ctx.fill();
};

// CUT CAKE
function cutCake(){
document.getElementById("hb").play();
startConfetti();
goTo("celebrate");
createBalloons();
}

// BALLOONS
function createBalloons(){
for(let i=0;i<10;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
document.body.appendChild(b);
}
}

// CONFETTI
const c=document.getElementById("confetti");
const ctx2=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let pieces=[];
for(let i=0;i<100;i++){
pieces.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function startConfetti(){
setInterval(()=>{
ctx2.clearRect(0,0,c.width,c.height);
ctx2.fillStyle="#ff6b81";
pieces.forEach(p=>{
ctx2.beginPath();
ctx2.arc(p.x,p.y,3,0,Math.PI*2);
ctx2.fill();
p.y+=2;
if(p.y>c.height)p.y=0;
});
},20);
}

// LETTER (ORIGINAL STYLE KEPT)
const text=`happy birthday, my love ❤️

i don’t even know where to start,
because how do you explain someone who became your safe place so quickly?

you’re the calm in my chaos,
my favorite person to be goofy with.
my go-to gossip partner.

i love how you care deeply,
how you scrunch your nose,
how you are you.

being with you feels like home.
always has, always will.`;

let i=0;
function startLetter(){
goTo("letter");
document.getElementById("kesariya").play();
function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text[i];
document.getElementById("type").play();
i++;
setTimeout(type,30);
}
}
type();
}

// VOICE
function playVoice(){
document.getElementById("voice").play();
}

// FLIP
function flip(el){
el.classList.toggle("clicked");
}
</script>

</body>
</html>
