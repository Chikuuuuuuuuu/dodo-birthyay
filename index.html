<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
  overflow: hidden;
}

/* card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255, 182, 193, 0.1);
}

/* screen */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 1s ease;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}

/* title */
h1 {
  font-size: 3rem;
  text-shadow: 0 0 20px rgba(255, 182, 193, 0.6);
}

/* button */
button {
  margin-top: 20px;
  padding: 12px 26px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4);
  color: #222;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

/* cake */
.cake {
  font-size: 80px;
  cursor: pointer;
}

/* message */
#message {
  max-width: 600px;
  line-height: 1.8;
}

/* floating hearts */
.heart {
  position: absolute;
  color: pink;
  font-size: 12px;
  animation: float 6s linear infinite;
  opacity: 0.5;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}

/* confetti */
canvas {
  position: absolute;
  top: 0;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- floating hearts -->
<script>
for (let i = 0; i < 20; i++) {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random()*3) + "s";
  document.body.appendChild(heart);
}
</script>

<!-- SCREEN 1 -->
<div class="screen" id="screen1">
  <div class="card">
    <h1>Happy Birthday Dodo ❤️</h1>
    <p style="opacity:0.7;">I made something soft for you…</p>
    <button onclick="goCake()">click this only if you love me</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen hidden" id="screen2">
  <div class="card">
    <div class="cake" onclick="cutCake()">🎂</div>
    <p>click to cut the cake 🎂</p>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen hidden" id="screen3">
  <div class="card">
    <h1>HAPPY BIRTHDAY ❤️</h1>
    <button onclick="startLove()">one more thing 💌</button>
  </div>
</div>

<!-- SCREEN 4 -->
<div class="screen hidden" id="screen4">
  <div class="card">
    <div id="message"></div>
  </div>
</div>

<audio id="hb" src="birthday.mp3"></audio>
<audio id="kesariya" src="kesariya.mp3"></audio>

<script>
// navigation
function goCake() {
  document.getElementById("screen1").classList.add("hidden");
  document.getElementById("screen2").classList.remove("hidden");
}

function cutCake() {
  document.getElementById("screen2").classList.add("hidden");
  document.getElementById("screen3").classList.remove("hidden");
  document.getElementById("hb").play();
}

function startLove() {
  document.getElementById("screen3").classList.add("hidden");
  document.getElementById("screen4").classList.remove("hidden");
  document.getElementById("hb").pause();
  document.getElementById("kesariya").play();
  startTyping();
}

// typing
const text = `happy birthday, my love ❤️

i don’t even know where to start,
because how do you explain someone who became your safe place so quickly?

you’re the calm in my chaos,
my favorite person to be goofy with.
my go-to gossip partner.

i love how you care deeply,
how you scrunch your nose when something mildly bothers you,
how you are you — so effortlessly.

being with you feels like home.
always has, always will.`;

let i = 0;

function startTyping() {
  function type() {
    if (i < text.length) {
      document.getElementById("message").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 35);
    }
  }
  type();
}

// confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

for (let i = 0; i < 100; i++) {
  pieces.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height
  });
}

setInterval(() => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ff9a9e";

  pieces.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();

    p.y += 2;
    if (p.y > canvas.height) p.y = 0;
  });
}, 20);
</script>

</body>
</html>
