<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Dancing+Script&family=Pixelify+Sans&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:#ffeef2;
overflow:hidden;
cursor:url('https://cur.cursors-4u.net/cursors/cur-2/cur116.cur'),auto;
}

/* SCREENS */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:1s;
pointer-events:none;
}
.active{opacity:1;pointer-events:auto;}

/* FLOATING BG */
.float{
position:fixed;
animation:float 8s linear infinite;
opacity:0.6;
font-size:20px;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* INTRO */
h1{
font-family:'Dancing Script';
font-size:60px;
margin:0;
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff9aa2;
color:white;
cursor:pointer;
margin-top:20px;
}

/* CAKE */
.cake{
width:200px;
height:120px;
background:pink;
border-radius:10px;
position:relative;
margin-top:20px;
}
.candle{
width:6px;
height:20px;
background:red;
position:absolute;
top:-20px;
}
.blown{opacity:0.2}

/* ENVELOPE */
.envelope{
position:fixed;
bottom:-200px;
left:50%;
transform:translateX(-50%);
width:250px;
height:160px;
background:#ff9aa2;
border-radius:10px;
transition:1s;
cursor:pointer;
}
.envelope.open{
bottom:20%;
height:300px;
background:white;
}

#letterText{
padding:20px;
font-family:'Dancing Script';
font-size:22px;
opacity:0;
transition:1s;
}

/* CONFETTI */
.confetti{
position:fixed;
width:10px;height:10px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}
@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<audio id="bgm" src="birthday.mp3" loop></audio>

<script>
/* FLOATING ELEMENTS */
const cute=["🐶","💖","✨","🌸"];
for(let i=0;i<25;i++){
let e=document.createElement("div");
e.className="float";
e.innerHTML=cute[Math.floor(Math.random()*cute.length)];
e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(e);
}
</script>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<h1>Happy Birthday 💖</h1>
<p>for someone really special</p>
<button onclick="start()">open surprise 🎁</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
<h2>make a wish & blow candles 🎂</h2>
<div class="cake" id="cake"></div>
<p id="status">blow into mic 🎤</p>
</div>

<!-- ENVELOPE -->
<div class="envelope" id="envelope" onclick="openLetter()">
<div id="letterText"></div>
</div>

<script>

/* START */
function start(){
next(2);
document.getElementById("bgm").play();
}

/* NAV */
function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

if(n===2){
createCandles();
startMic();
}
}

/* CANDLES */
function createCandles(){
const cake=document.getElementById("cake");
cake.innerHTML="";
for(let i=0;i<6;i++){
let c=document.createElement("div");
c.className="candle";
c.style.left=(25*i+20)+"px";
cake.appendChild(c);
}
}

/* MIC */
async function startMic(){
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
const ctx=new AudioContext();
const analyser=ctx.createAnalyser();
const source=ctx.createMediaStreamSource(stream);

source.connect(analyser);
const data=new Uint8Array(analyser.frequencyBinCount);

function detect(){
analyser.getByteFrequencyData(data);
let avg=data.reduce((a,b)=>a+b)/data.length;

if(avg>60){
blowCandles();
return;
}
requestAnimationFrame(detect);
}
detect();
}

/* BLOW */
function blowCandles(){
document.querySelectorAll(".candle").forEach(c=>c.classList.add("blown"));
document.getElementById("status").innerText="YAYYY 🎉";

confettiBlast();

setTimeout(()=>{
document.getElementById("envelope").style.bottom="20%";
},1200);
}

/* CONFETTI */
function confettiBlast(){
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,70%)`;
c.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);
}
}

/* LETTER */
const text=`happy birthday my love 💖

you are my safe place,
my chaos, my calm.

i'm so lucky to have you.`;

let i=0;

function openLetter(){
let env=document.getElementById("envelope");
env.classList.add("open");

let el=document.getElementById("letterText");
el.style.opacity=1;

function type(){
if(i<text.length){
el.innerHTML+=text[i];
i++;
setTimeout(type,40);
}
}
type();
}

</script>

</body>
</html>
