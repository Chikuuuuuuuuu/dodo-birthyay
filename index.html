<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dodo 💖</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&family=Pixelify+Sans&display=swap" rel="stylesheet">

</head>

<body>

<audio id="birthdaySong" src="birthday.mp3"></audio>
<audio id="voiceNote" src="voice.mpeg"></audio>

<div class="main">

    <h1>make a wish & blow candles 🎂</h1>

    <div class="cake-wrapper">
        <div class="cake" id="cake"></div>
    </div>

    <p id="status">blow into mic 🎤</p>

    <button onclick="openLetter()">open 💌</button>

</div>

<div class="letter" id="letter">
    <p id="text"></p>
</div>

<script>

/* LETTER */
const message = `happy birthday my love 💖
you are my safe place,
my chaos, my calm.
i’m so lucky to have you.`;

let i = 0;

function openLetter(){
    document.getElementById("letter").style.display="block";

    document.getElementById("birthdaySong").pause();

    let voice = document.getElementById("voiceNote");
    voice.currentTime = 0;
    voice.play();

    let el = document.getElementById("text");
    el.innerHTML="";

    function type(){
        if(i < message.length){
            el.innerHTML += message[i];
            i++;
            setTimeout(type,40);
        }
    }
    type();
}

/* CAKE */
const cake = document.getElementById("cake");

function createCandles(){
    for(let i=0;i<6;i++){
        let c = document.createElement("div");
        c.className="candle";
        c.style.left = (i*12+10)+"px";
        cake.appendChild(c);
    }
}
createCandles();

/* MIC */
async function startMic(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const ctx = new AudioContext();
        const analyser = ctx.createAnalyser();
        const source = ctx.createMediaStreamSource(stream);

        source.connect(analyser);

        const data = new Uint8Array(analyser.frequencyBinCount);

        function detect(){
            analyser.getByteFrequencyData(data);

            let avg = data.reduce((a,b)=>a+b)/data.length;

            if(avg>60){
                blow();
                return;
            }

            requestAnimationFrame(detect);
        }
        detect();

    }catch(e){
        console.log("mic blocked");
    }
}

function blow(){
    document.querySelectorAll(".candle").forEach(c=>c.classList.add("blown"));

    document.getElementById("status").innerText="YAY DODO 🎉";

    let song = document.getElementById("birthdaySong");
    song.currentTime=0;
    song.play();
}

startMic();

</script>

</body>
</html>
