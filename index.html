<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&family=Pixelify+Sans&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#ffeef2;
font-family:'Poppins';
overflow:hidden;
}

/* SCREENS */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
pointer-events:none;
}
.active{opacity:1;pointer-events:auto;}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:70%;
}

/* FLOAT BG */
.bg{
position:fixed;
animation:float 8s linear infinite;
opacity:0.5;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* CAKE MIC */
.cake{
width:200px;height:120px;
background:pink;
position:relative;
margin:auto;
border-radius:10px;
}
.candle{
width:6px;height:20px;
background:red;
position:absolute;
top:-20px;
}
.blown{opacity:0.2}

/* DRAW CAKE */
#cakeBox{position:relative;width:150px;height:150px;margin:auto;}
#drawCanvas{position:absolute;top:15px;left:15px;width:120px;height:120px;}
#knife{position:absolute;top:40px;left:0;font-size:30px;}
#cutLine{position:absolute;top:70px;height:3px;background:red;width:0;}

.gallery img{
width:100px;height:100px;border-radius:10px;
}

/* LETTER */
#message{
font-family:'Great Vibes';
font-size:28px;
}
</style>
</head>

<body>

<script>
const cute=["🐶","💖","✨","🌸"];
for(let i=0;i<20;i++){
let e=document.createElement("div");
e.className="bg";
e.innerHTML=cute[Math.floor(Math.random()*cute.length)];
e.style.left=Math.random()*100+"vw";
document.body.appendChild(e);
}
</script>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<div class="card">
<h1>Happy Birthday 💖</h1>
<button onclick="next(2)">start 🎁</button>
</div>
</div>

<!-- SCREEN 2 (MIC CAKE) -->
<div class="screen" id="s2">
<div class="card">
<h2>blow the candles 🎂</h2>
<div class="cake" id="cake"></div>
<p id="status">blow into mic 🎤</p>
</div>
</div>

<!-- SCREEN 3 (DRAW CAKE) -->
<div class="screen" id="s3">
<div class="card">
<h2>decorate cake 🎂</h2>

<div id="cakeBox">
<div id="cakeBase" style="font-size:100px;">🎂</div>
<canvas id="drawCanvas"></canvas>
<div id="knife">🔪</div>
<div id="cutLine"></div>
</div>

<button onclick="setTool('red')">❤️</button>
<button onclick="setTool('white')">🤍</button>
</div>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
<div class="card">
<h2>memories 💖</h2>
<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
</div>
<button onclick="next(5)">next 💌</button>
</div>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="s5">
<div class="card">
<p id="message"></p>
</div>
</div>

<script>

/* NAV */
function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

if(n===2) startMic();
if(n===5) startTyping();
}

/* MIC BLOW */
function createCandles(){
const cake=document.getElementById("cake");
for(let i=0;i<5;i++){
let c=document.createElement("div");
c.className="candle";
c.style.left=(20*i+30)+"px";
cake.appendChild(c);
}
}
createCandles();

async function startMic(){
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
const ctx=new AudioContext();
const analyser=ctx.createAnalyser();
const source=ctx.createMediaStreamSource(stream);
source.connect(analyser);

const data=new Uint8Array(analyser.frequencyBinCount);

function detect(){
analyser.getByteFrequencyData(data);
let avg=data.reduce((a,b)=>a+b)/data.length;

if(avg>60){
document.querySelectorAll(".candle").forEach(c=>c.classList.add("blown"));
document.getElementById("status").innerText="YAY 🎉";
setTimeout(()=>next(3),1500);
return;
}
requestAnimationFrame(detect);
}
detect();
}

/* DRAW */
let tool="red";
function setTool(t){tool=t;}

const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
canvas.width=120;canvas.height=120;

canvas.onmousemove=e=>{
if(e.buttons!==1)return;
ctx.fillStyle="#ff4d6d";
ctx.beginPath();
ctx.arc(e.offsetX,e.offsetY,3,0,Math.PI*2);
ctx.fill();
};

/* LETTER */
const text=`happy birthday my love 💖
you are everything to me.`;

let i=0;
function startTyping(){
let el=document.getElementById("message");
function type(){
if(i<text.length){
el.innerHTML+=text[i];
i++;
setTimeout(type,30);
}
}
type();
}

</script>

</body>
</html>
