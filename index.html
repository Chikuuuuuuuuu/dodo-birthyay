<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dodo 💖</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&family=Pixelify+Sans&display=swap" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.cake-container {
  position: relative;
  transform: scale(6);
  margin-top: 60px;
}

.cake {
  position: relative;
}

.candle {
  width: 6px;
  height: 20px;
  position: absolute;
  top: -20px;
}

.blown {
  opacity: 0.2;
}
</style>

</head>

<body>

<audio id="birthdaySong" src="birthday.mp3"></audio>
<audio id="voiceNote" src="voice.mpeg"></audio>

<div id="wrapper">

    <div class="content">

        <!-- LEFT -->
        <div class="left">

            <div class="title">
                <h1 class="happy">
                    <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
                </h1>
                <h1 class="birthday">
                    <span>B</span><span>i</span><span>r</span><span>t</span><span>h</span><span>d</span><span>a</span><span>y</span>
                </h1>
            </div>

            <div class="date__of__birth"><span></span></div>

            <div class="btn">
                <button id="btn__letter">
                    <div class="mail">
                        Click Here Dodo 💌
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                </button>
            </div>

        </div>

        <!-- RIGHT (CAKE) -->
        <div class="right">
            <div class="container">

                <div id="birthdayText">
                    <h2>Happy Birthday, Dodo 🎂</h2>
                    <p id="status">blow candles 🎤</p>
                </div>

                <div class="cake-container">
                    <div class="cake" id="cake"></div>
                </div>

            </div>
        </div>

    </div>

    <!-- LETTER -->
    <div class="boxMail">
        <i class="fa-solid fa-xmark"></i>
        <div class="boxMail-container">

            <div class="card1">
                <h4>To Dodo 💖</h4>
            </div>

            <div class="card2">
                <div class="card2-content">
                    <h3>Happy Birthday 💖</h3>
                    <h2 id="letterText"></h2>
                </div>
            </div>

        </div>
    </div>

</div>

<script>

/* DATE */
let datetxt = "27 May";
let charArrDate = datetxt.split('');
let currentIndex = 0;

let date__of__birth = document.querySelector(".date__of__birth span");

setInterval(() => {
    if (currentIndex < charArrDate.length) {
        date__of__birth.textContent += charArrDate[currentIndex];
        currentIndex++;
    }
}, 100);


/* LETTER TEXT */
let text = "Happy Birthday Dodo 💖 You are my safe place, my chaos, my calm. I’m so lucky to have you.";
let i = 0;

let mailBox = document.querySelector('.mail');
let boxmail = document.querySelector('.boxMail');
let close = document.querySelector('.fa-xmark');
let letter = document.getElementById("letterText");

mailBox.onclick = function () {

    boxmail.classList.add('active');

    // stop song
    document.getElementById("birthdaySong").pause();

    // play voice
    let voice = document.getElementById("voiceNote");
    voice.currentTime = 0;
    voice.play();

    i = 0;
    letter.textContent = "";

    let interval = setInterval(() => {
        if (i < text.length) {
            letter.textContent += text[i];
            i++;
        } else clearInterval(interval);
    }, 40);
};

close.onclick = () => boxmail.classList.remove('active');


/* CAKE */
const cake = document.getElementById("cake");

const colors = ["green-candle","purple-candle","blue-candle","yellow-candle"];

function createCandles(count){
  cake.innerHTML="";
  for(let i=0;i<count;i++){
    const c=document.createElement("div");
    c.classList.add("candle");

    const color=colors[Math.floor(Math.random()*colors.length)];
    c.classList.add(color);

    c.style.left=(i*12+10)+"px";
    cake.appendChild(c);
  }
}
createCandles(6);


/* MIC */
async function startMic(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const ctx = new AudioContext();
    const analyser = ctx.createAnalyser();
    const source = ctx.createMediaStreamSource(stream);

    source.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detect(){
      analyser.getByteFrequencyData(data);

      let avg = data.reduce((a,b)=>a+b)/data.length;

      if(avg>60){
        blow();
        return;
      }

      requestAnimationFrame(detect);
    }

    detect();

  }catch(e){
    console.log("mic error", e);
  }
}

function blow(){
  document.querySelectorAll(".candle").forEach(c=>{
    c.classList.add("blown");
  });

  document.getElementById("status").innerText="YAY DODO 🎉";

  // play birthday song
  let song = document.getElementById("birthdaySong");
  song.currentTime = 0;
  song.play();

  setTimeout(()=>{
    document.querySelector('.mail').click();
  },1500);
}

startMic();

</script>

</body>
</html>
