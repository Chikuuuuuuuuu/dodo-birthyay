<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffeef2);
  color: #3b2f2f;
  overflow: hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.navbar span {
  cursor: pointer;
  font-weight: 600;
}

/* SCREEN */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 0.8s ease;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  max-width: 600px;
  box-shadow: 0 0 40px rgba(255,182,193,0.2);
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 10px 22px;
  border-radius: 20px;
  border: none;
  background: #ff9aa2;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* CAKE DRAW */
#drawCanvas {
  position: absolute;
  width: 120px;
  height: 120px;
  cursor: crosshair;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 160px);
  gap: 15px;
}

.gallery img {
  width: 160px;
  height: 160px;
  border-radius: 12px;
  border: 2px dotted #ff9aa2;
  cursor: pointer;
  object-fit: cover;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 15px;
  border-radius: 12px;
  display: none;
}

/* VOICE CINEMATIC */
.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  display:none;
  z-index:1500;
}

.voice-active {
  box-shadow: 0 0 40px rgba(255,182,193,0.6);
  transform: scale(1.02);
}

.voice-btn {
  background: linear-gradient(45deg,#ff9aa2,#ffc3a0);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% {box-shadow:0 0 0 rgba(255,154,162,0.5);}
  50% {box-shadow:0 0 20px rgba(255,154,162,0.8);}
  100% {box-shadow:0 0 0 rgba(255,154,162,0.5);}
}
</style>
</head>

<body>

<div id="overlay" class="overlay"></div>

<div class="navbar">
  <span onclick="goTo('screen1')">Home</span>
  <span onclick="goTo('screen2')">Cake</span>
  <span onclick="goTo('screen5')">Memories</span>
  <span onclick="goTo('screen4')">Letter</span>
</div>

<!-- HOME -->
<div class="screen" id="screen1">
  <div class="card">
    <h1>Happy Birthday ❤️</h1>
    <p>i made something for you…</p>
    <button onclick="goTo('screen2')">click this only if you love me</button>
  </div>
</div>

<!-- CAKE -->
<div class="screen hidden" id="screen2">
  <div class="card">
    <h2>decorate your cake 🎂</h2>
    <div style="position:relative;">
      <div style="font-size:120px;">🎂</div>
      <canvas id="drawCanvas"></canvas>
    </div>
    <button onclick="cutCake()">cut the cake 🎂</button>
  </div>
</div>

<!-- LETTER -->
<div class="screen hidden" id="screen4">
  <div class="card" id="letterCard">
    <div id="message"></div>
    <button onclick="playVoice()" class="voice-btn">
      only click this when you really miss me 💖
    </button>
  </div>
</div>

<!-- MEMORIES -->
<div class="screen hidden" id="screen5">
  <div class="card">
    <div class="gallery">
      <img src="photo1.jpg" onclick="showMsg(0)">
      <img src="photo2.jpg" onclick="showMsg(1)">
      <img src="photo3.jpg" onclick="showMsg(2)">
      <img src="photo4.jpg" onclick="showMsg(3)">
      <img src="photo5.jpg" onclick="showMsg(4)">
    </div>
  </div>
</div>

<div id="popup" class="popup"></div>

<audio id="hb" src="birthday.mp3"></audio>
<audio id="kesariya" src="kesariya.mp3"></audio>
<audio id="type" src="type.mp3"></audio>
<audio id="voice" src="voice.mp3"></audio>

<script>
// NAV
function goTo(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// DRAW
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
canvas.width=120; canvas.height=120;

let drawing=false;
canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=e=>{
  if(!drawing) return;
  ctx.fillStyle="#ff6b81";
  ctx.beginPath();
  ctx.arc(e.offsetX,e.offsetY,2,0,Math.PI*2);
  ctx.fill();
};

// CUT
function cutCake(){
  document.getElementById("hb").play();
  goTo("screen4");
  startTyping();
}

// LETTER
const text=`read this slowly… 💌

happy birthday, my love ❤️

you are my safe place,
my favorite person,
and my home.

i love you endlessly.`;

let i=0;
function startTyping(){
  function type(){
    if(i<text.length){
      document.getElementById("message").innerHTML+=text[i];
      document.getElementById("type").play();
      i++;
      setTimeout(type,30);
    }
  }
  type();
}

// VOICE CINEMATIC
function playVoice(){
  const voice=document.getElementById("voice");
  const overlay=document.getElementById("overlay");
  const card=document.getElementById("letterCard");

  overlay.style.display="block";
  card.classList.add("voice-active");

  voice.play();

  voice.onended=()=>{
    overlay.style.display="none";
    card.classList.remove("voice-active");
  };
}

// POPUPS
const messages=[
  "this little baby… already stealing hearts 🥺❤️",
  "the way you love your maa is everything ❤️",
  "this is where you shine ⚽",
  "HOW are you this gorgeous 😭",
  "this is us ❤️"
];

function showMsg(i){
  let p=document.getElementById("popup");
  p.innerHTML=messages[i];
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2500);
}
</script>

</body>
</html>
