<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dodo 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Dancing+Script&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins';
overflow:hidden;
}

/* screens */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:0.8s;
pointer-events:none;
text-align:center;
}
.active{
opacity:1;
pointer-events:auto;
}

/* backgrounds */
#s1{background:url('bghello1.jpg') center/cover;}
#s2,#s3,#s4,#s5{background:url('bg1.jpg') center/cover;}

h1{
font-size:24px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff8fab;
color:white;
margin-top:20px;
}

/* cake */
.cake{
font-size:100px;
position:relative;
}

.candle{
position:absolute;
top:-20px;
font-size:22px;
}

.blown{
opacity:0.2;
}

/* gallery */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}
.gallery img{
width:140px;
height:140px;
border-radius:12px;
}

/* letter */
#letter{
background:rgba(255,255,255,0.85);
padding:20px;
border-radius:20px;
width:80%;
max-width:400px;
font-family:'Dancing Script';
font-size:22px;
}

/* confetti */
.confetti{
position:fixed;
width:6px;
height:6px;
top:-10px;
animation:fall linear forwards;
}
@keyframes fall{
to{transform:translateY(100vh);}
}

</style>
</head>

<body>

<audio id="birthday" src="birthday.mp3"></audio>
<audio id="voice" src="voice.mpeg"></audio>
<audio id="typing" src="type.mp3"></audio>
<audio id="bgmusic" src="kesariya.mp3"></audio>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<h1>happy birthday dodo 💖</h1>
<button onclick="next(2)">start 🎁</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
<h1>make a wish & blow candles 🎂</h1>
<div class="cake" id="cake">🎂</div>
<p id="status">blow 🎤</p>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
<h1>our memories 💖</h1>
<div class="gallery">
<img src="image01.jpeg">
<img src="image02.jpeg">
<img src="image03.jpeg">
<img src="image04.jpeg">
<img src="image05.jpeg">
</div>
<button onclick="next(4)">next 💌</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4" style="background:url('image05.jpeg') center/cover;">
<div id="letter"></div>
<button id="nextBtn" onclick="goToVoice()" style="display:none;">next 💌</button>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="s5">
<h1>for you 💖</h1>
<button onclick="playVoice()" style="font-size:30px;">🎤</button>
<p>tap to listen 🎧</p>
</div>

<script>
/* NAV */
function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

/* stop birthday when leaving cake */
if(n !== 2){
document.getElementById("birthday").pause();
}

if(n===2){
setupCandles();
startMic();
}

if(n===4){
document.getElementById("nextBtn").style.display="none";
showLetter();

/* start kesariya */
let bg = document.getElementById("bgmusic");
bg.currentTime = 0;
bg.play();
}
}

/* candles */
function setupCandles(){
let cake=document.getElementById("cake");

/* clear old candles */
cake.innerHTML = "🎂";

for(let i=0;i<4;i++){
let c=document.createElement("div");
c.className="candle";
c.innerHTML="🕯️";
c.style.left=(i*20)+"px";
cake.appendChild(c);
}
}

/* mic */
async function startMic(){
try{
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
const ctx=new AudioContext();
const analyser=ctx.createAnalyser();
const source=ctx.createMediaStreamSource(stream);

source.connect(analyser);
const data=new Uint8Array(analyser.frequencyBinCount);

function detect(){
analyser.getByteFrequencyData(data);
let avg=data.reduce((a,b)=>a+b)/data.length;

if(avg>60){
blow();
return;
}
requestAnimationFrame(detect);
}
detect();

}catch(e){
console.log("mic blocked");
}
}

/* confetti */
function confetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,70%)`;
c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* blow */
function blow(){
document.querySelectorAll(".candle").forEach(c=>c.classList.add("blown"));
document.getElementById("status").innerText="YAY DODO 🎉";

let song = document.getElementById("birthday");
song.currentTime=0;
song.play();

confetti();

/* WAIT 15 SECONDS */
setTimeout(()=>next(3),15000);
}

/* letter */
const text=`happy birthday my love 💖

you are my safe place,
my chaos, my calm.

i’m so lucky to have you.`;

let i=0;

function showLetter(){
let el=document.getElementById("letter");
el.innerHTML="";
i=0;

function type(){
if(i<text.length){
el.innerHTML+=text[i];

let t=document.getElementById("typing");
t.currentTime=0;
t.play();

i++;
setTimeout(type,40);
}else{
/* show next button after typing */
document.getElementById("nextBtn").style.display="block";
}
}
type();
}

/* go to voice screen */
function goToVoice(){
document.getElementById("bgmusic").pause();
next(5);
}

/* play voice */
function playVoice(){
let v = document.getElementById("voice");
v.currentTime=0;
v.play();
}

</script>

</body>
</html>
