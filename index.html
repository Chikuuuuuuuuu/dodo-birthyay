<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ffd6e0,#ffeef2);
color:#3b2f2f;
overflow:hidden;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:rgba(255,255,255,0.6);
z-index:1000;
}

.navbar span{
cursor:pointer;
font-weight:600;
}

/* SCREEN */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

/* CARD */
.card{
background:rgba(255,255,255,0.7);
padding:40px;
border-radius:20px;
text-align:center;
}

/* TITLE */
h1{
font-family:'Great Vibes',cursive;
font-size:3rem;
}

/* BUTTON */
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff9aa2;
color:white;
cursor:pointer;
}

/* CAKE */
#cakeBox{
position:relative;
width:150px;height:150px;
margin:auto;
}

#drawCanvas{
position:absolute;
top:15px;
left:15px;
width:120px;height:120px;
}

/* PALETTE */
.palette span{
display:inline-block;
width:20px;height:20px;
border-radius:50%;
margin:5px;
cursor:pointer;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(2,150px);
gap:15px;
}

.gallery img{
width:150px;height:150px;
object-fit:cover;
border-radius:10px;
border:2px dotted #ff9aa2;
cursor:pointer;
}

/* FLIP */
.flip{perspective:1000px;}
.inner{
transition:0.6s;
transform-style:preserve-3d;
position:relative;
}
.flip.clicked .inner{
transform:rotateY(180deg);
}
.front,.back{
position:absolute;
width:100%;height:100%;
backface-visibility:hidden;
}
.back{
transform:rotateY(180deg);
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
padding:5px;
}

/* BALLOONS */
.balloon{
position:absolute;
bottom:-50px;
width:30px;height:40px;
background:#ff9aa2;
border-radius:50%;
animation:float 6s infinite;
}
@keyframes float{
to{transform:translateY(-100vh);}
}

/* CONFETTI */
canvas{
position:absolute;
top:0;
}
</style>
</head>

<body>

<div class="navbar">
<span onclick="goTo('home')">Home</span>
<span onclick="goTo('cake')">Cake</span>
<span onclick="goTo('memories')">Memories</span>
<span onclick="goTo('letter')">Letter</span>
</div>

<canvas id="confetti"></canvas>

<!-- HOME -->
<div class="screen" id="home">
<div class="card">
<h1>Happy Birthday ❤️</h1>
<button onclick="goTo('cake')">click this only if you love me</button>
</div>
</div>

<!-- CAKE -->
<div class="screen hidden" id="cake">
<div class="card">
<h2>decorate your cake 🎂</h2>

<div id="cakeBox">
<div id="cakeBase" style="font-size:120px;">🎂</div>
<canvas id="drawCanvas"></canvas>
<div id="knife" style="display:none;position:absolute;top:50px;left:50px;font-size:30px;cursor:pointer;">🔪</div>
</div>

<div class="palette">
<span style="background:red" onclick="setColor('red')"></span>
<span style="background:blue" onclick="setColor('blue')"></span>
<span style="background:black" onclick="setColor('black')"></span>
</div>

<button onclick="showKnife()">done decorating</button>
</div>
</div>

<!-- MEMORIES -->
<div class="screen hidden" id="memories">
<div class="card">
<div class="gallery">

<div class="flip" onclick="flip(this)">
<div class="inner">
<div class="front"><img src="photo1.jpeg"></div>
<div class="back">baby millennium winner 🥺</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="inner">
<div class="front"><img src="photo2.jpeg"></div>
<div class="back">the way you love your maa ❤️</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="inner">
<div class="front"><img src="photo3.jpeg"></div>
<div class="back">your football world ⚽</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="inner">
<div class="front"><img src="photo4.jpeg"></div>
<div class="back">okay but wow 😭</div>
</div>
</div>

<div class="flip" onclick="flip(this)">
<div class="inner">
<div class="front"><img src="photo5.jpeg"></div>
<div class="back">this is us ❤️</div>
</div>
</div>

</div>
</div>
</div>

<!-- LETTER -->
<div class="screen hidden" id="letter">
<div class="card">
<p id="message"></p>
<button onclick="playVoice()">play this when you miss me 💖</button>
</div>
</div>

<audio id="hb" src="birthday.mp3"></audio>
<audio id="kesariya" src="kesariya.mp3"></audio>
<audio id="voice" src="voice.mpeg"></audio>

<script>

// NAVIGATION
function goTo(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

// DRAW
let color="red";
function setColor(c){color=c;}

const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
canvas.width=120;canvas.height=120;

let draw=false;
canvas.onmousedown=()=>draw=true;
canvas.onmouseup=()=>draw=false;
canvas.onmousemove=e=>{
if(!draw)return;
ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(e.offsetX,e.offsetY,3,0,Math.PI*2);
ctx.fill();
};

// KNIFE
function showKnife(){
document.getElementById("knife").style.display="block";
}

document.getElementById("knife").onclick=function(){
document.getElementById("cakeBase").innerHTML="🍰";
document.getElementById("hb").play();
startConfetti();
createBalloons();

setTimeout(()=>{
document.getElementById("kesariya").play();
},4000);
};

// BALLOONS
function createBalloons(){
for(let i=0;i<10;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
document.body.appendChild(b);
}
}

// CONFETTI
const c=document.getElementById("confetti");
const ctx2=c.getContext("2d");
c.width=window.innerWidth;c.height=window.innerHeight;

let pieces=[];
for(let i=0;i<100;i++){
pieces.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function startConfetti(){
setInterval(()=>{
ctx2.clearRect(0,0,c.width,c.height);
ctx2.fillStyle="#ff6b81";
pieces.forEach(p=>{
ctx2.beginPath();
ctx2.arc(p.x,p.y,3,0,Math.PI*2);
ctx2.fill();
p.y+=2;
if(p.y>c.height)p.y=0;
});
},20);
}

// LETTER
document.getElementById("message").innerHTML=`
happy birthday, my love ❤️

you’re the calm in my chaos,
my favorite person to be goofy with.

being with you feels like home.
always has, always will.
`;

// VOICE
function playVoice(){
document.getElementById("voice").play();
}

// FLIP
function flip(el){
el.classList.toggle("clicked");
}
</script>

</body>
</html>
