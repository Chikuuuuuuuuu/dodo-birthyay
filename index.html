<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dodo 💖</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
overflow:hidden;
}

/* screens */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
pointer-events:none;
}
.active{
opacity:1;
pointer-events:auto;
}

/* backgrounds */
#s1{background:url('bghello1.jpg') center/cover;}
#s2,#s3,#s4{background:url('bg1.jpg') center/cover;}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff8fab;
color:white;
cursor:pointer;
margin-top:20px;
}

/* gallery */
.gallery{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}
.gallery img{
width:100px;
height:100px;
border-radius:10px;
}

/* letter */
#letter{
background:rgba(255,255,255,0.85);
padding:20px;
border-radius:20px;
width:70%;
max-width:400px;
font-family:'Dancing Script';
font-size:24px;
}

/* confetti */
.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);}
}

/* cake size */
.cake-container{
transform:scale(3.5);
margin-top:40px;
}
</style>
</head>

<body>

<audio id="birthday" src="birthday.mp3"></audio>
<audio id="voice" src="voice.mpeg"></audio>
<audio id="typing" src="type.mp3"></audio>
<audio id="bgmusic" src="kesariya.mp3" loop></audio>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<h1>happy birthday dodo 💖</h1>
<button onclick="next(2)">start 🎁</button>
</div>

<!-- SCREEN 2 (CAKE) -->
<div class="screen" id="s2">
<h1>make a wish & blow candles 🎂</h1>

<div class="cake-container">
  <div class="cake" id="cake">
    <div class="plate"></div>
    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top"></div>
    <div class="icing"></div>
    <div class="drip drip1"></div>
    <div class="drip drip2"></div>
    <div class="drip drip3"></div>
  </div>
</div>

<p id="status">blow 🎤</p>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
<h1>our memories 💖</h1>
<div class="gallery">
<img src="image01.jpeg">
<img src="image02.jpeg">
<img src="image03.jpeg">
<img src="image04.jpeg">
<img src="image05.jpeg">
</div>
<button onclick="next(4)">next 💌</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
<div id="letter"></div>
</div>

<script>

/* NAVIGATION */
function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

/* stop birthday song when leaving cake */
document.getElementById("birthday").pause();

if(n===2){
setupCandles();
startMic();
}
if(n===4){
showLetter();
document.getElementById("bgmusic").play();
}
}

/* ADD CANDLES */
function setupCandles(){
let cake=document.getElementById("cake");

for(let i=0;i<6;i++){
let c=document.createElement("div");
c.className="candle";
c.style.left=(i*6+10)+"px";
c.style.top="-8px";
cake.appendChild(c);
}
}

/* MIC DETECTION */
async function startMic(){
try{
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
const ctx=new AudioContext();
const analyser=ctx.createAnalyser();
const source=ctx.createMediaStreamSource(stream);

source.connect(analyser);

const data=new Uint8Array(analyser.frequencyBinCount);

function detect(){
analyser.getByteFrequencyData(data);
let avg=data.reduce((a,b)=>a+b)/data.length;

if(avg>60){
blow();
return;
}
requestAnimationFrame(detect);
}
detect();

}catch(e){
console.log("mic blocked");
}
}

/* CONFETTI */
function confetti(){
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,70%)`;
c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);
}
}

/* BLOW */
function blow(){
document.querySelectorAll(".candle").forEach(c=>c.classList.add("blown"));
document.getElementById("status").innerText="YAY DODO 🎉";

document.getElementById("birthday").currentTime=0;
document.getElementById("birthday").play();

confetti();

setTimeout(()=>next(3),1500);
}

/* LETTER */
const text=`happy birthday my love 💖

you are my safe place,
my chaos, my calm.

i’m so lucky to have you.`;

let i=0;

function showLetter(){
let el=document.getElementById("letter");

document.getElementById("voice").pause();
document.getElementById("voice").currentTime=0;

function type(){
if(i<text.length){
el.innerHTML+=text[i];

let t=document.getElementById("typing");
t.currentTime=0;
t.play();

i++;
setTimeout(type,40);
}else{
document.getElementById("voice").play();
}
}
type();
}

</script>

</body>
</html>
